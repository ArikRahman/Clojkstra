<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clojkstra</title>
  <!--
    GitHub Pages SPA redirect trick.

    GitHub Pages serves this 404.html whenever a URL like
      https://yourname.github.io/clojkstra/about
    is hit directly (e.g. on refresh or a shared link).

    Because Clojkstra uses hash-based routing (#/about), direct path-based
    URLs will never actually be generated by the app itself — but this file
    is kept here as a safety net in case someone lands on a bare path.

    The script below immediately redirects to the root index.html,
    preserving any path/query info in the hash so the router can pick it up.
  -->
  <script>
    // Grab everything after the origin (and optional repo sub-path).
    // For a project page at /clojkstra/, strip that prefix so we get
    // the "real" path the user wanted.
    (function () {
      var segmentCount = 1; // set to 0 for a user/org page (username.github.io)
      var location = window.location;
      var pathSegments = location.pathname
        .split('/')
        .slice(1); // drop leading ''

      // Build the redirect URL:
      //   origin + repo-prefix + /? + encoded remaining path as hash
      var repoPrefix = pathSegments.slice(0, segmentCount).join('/');
      var remaining  = pathSegments.slice(segmentCount).join('/');

      var redirectTo =
        location.protocol + '//' +
        location.host + '/' +
        (repoPrefix ? repoPrefix + '/' : '') +
        '?p=/' + remaining +
        (location.search ? '&q=' + location.search.slice(1) : '') +
        location.hash;

      location.replace(redirectTo);
    }());
  </script>
</head>
<body>
  <!-- Redirecting… -->
</body>
</html>
