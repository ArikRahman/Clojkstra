<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="dark" />
        <meta
            name="description"
            content="Clojkstra — ClojureScript + re-frame starter template"
        />

        <title>Clojkstra</title>

        <!-- Favicon (inline SVG data URI — no extra files needed) -->
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
        />

        <!-- Tailwind CSS via CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Inter", "system-ui", "sans-serif"],
                            mono: [
                                "JetBrains Mono",
                                "ui-monospace",
                                "monospace",
                            ],
                        },
                        colors: {
                            // Rosé Pine Moon palette
                            "rp-base": "#232136",
                            "rp-surface": "#2a273f",
                            "rp-overlay": "#393552",
                            "rp-muted": "#6e6a86",
                            "rp-subtle": "#908caa",
                            "rp-text": "#e0def4",
                            "rp-love": "#eb6f92",
                            "rp-gold": "#f6c177",
                            "rp-rose": "#ea9a97",
                            "rp-pine": "#3e8fb0",
                            "rp-foam": "#9ccfd8",
                            "rp-iris": "#c4a7e7",
                            "rp-highlight-low": "#2a283e",
                            "rp-highlight-med": "#44415a",
                            "rp-highlight-high": "#56526e",
                        },
                    },
                },
            };
        </script>

        <!-- Inter + JetBrains Mono from Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <style>
            /* Prevent flash of unstyled content while ClojureScript loads */
            #app:empty {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: #232136;
            }
            #app:empty::after {
                content: "";
                width: 2.5rem;
                height: 2.5rem;
                border: 3px solid #44415a;
                border-top-color: #c4a7e7;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body class="bg-rp-base text-rp-text font-sans antialiased">
        <!-- React/Reagent mounts here — do not put content inside this div -->
        <div id="app"></div>

        <!-- ClojureScript bundle produced by shadow-cljs -->
        <script src="cljs-out/main.js"></script>
    </body>
</html>
