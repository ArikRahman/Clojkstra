<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="dark" />
        <meta
            name="description"
            content="Clojkstra — ClojureScript + re-frame starter template"
        />

        <title>Clojkstra</title>

        <!-- Favicon (inline SVG data URI — no extra files needed) -->
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
        />

        <!-- Tailwind CSS via CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Inter", "system-ui", "sans-serif"],
                            mono: [
                                "JetBrains Mono",
                                "ui-monospace",
                                "monospace",
                            ],
                        },
                    },
                },
            };
        </script>

        <!-- Inter + JetBrains Mono from Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <style>
            /* Prevent flash of unstyled content while ClojureScript loads */
            #app:empty {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: #0f0f0f;
            }
            #app:empty::after {
                content: "";
                width: 2.5rem;
                height: 2.5rem;
                border: 3px solid #2d2d4e;
                border-top-color: #818cf8;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body class="bg-gray-950 text-gray-100 font-sans antialiased">
        <!-- React/Reagent mounts here — do not put content inside this div -->
        <div id="app"></div>

        <!-- ClojureScript bundle produced by shadow-cljs -->
        <script src="/cljs-out/main.js"></script>
    </body>
</html>
